name: Continuous Integration

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14.2
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: developer
          POSTGRES_DB: forumapi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Run migrations
        run: npm run migrate up
        env:
          PGHOST: 127.0.0.1
          PGUSER: postgres
          PGPASSWORD: developer
          PGDATABASE: forumapi_test
          PGPORT: 5432

      - name: Run tests
        run: npm run test
        env:
          PGHOST_TEST: 127.0.0.1
          PGUSER_TEST: postgres
          PGPASSWORD_TEST: "developer"
          PGDATABASE_TEST: forumapi_test
          PGPORT_TEST: 5432
          PGHOST: 127.0.0.1
          PGUSER: postgres
          PGPASSWORD: "developer"
          PGDATABASE: forumapi_test
          PGPORT: 5432
          ACCESS_TOKEN_KEY: secret_access_token_ci
          REFRESH_TOKEN_KEY: secret_refresh_token_ci
          ACCESS_TOKEN_AGE: 3000
